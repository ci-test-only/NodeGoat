name: Polaris Reusable Scan # Reusable workflow, called by other workflows
on:
  workflow_call: # Can only be called by other workflows, not triggered directly
    inputs:
      assessment_types: # Scan type passed by caller (e.g. 'SAST', 'SCA', or 'SAST,SCA')
        required: true
        type: string
    secrets:
      POLARIS_ACCESS_TOKEN: # Caller must pass Polaris token
        required: true
permissions:
  contents: read # Required for checkout
jobs:
  polaris-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Checkout source code
      - uses: blackduck-inc/black-duck-security-scan@v2
        with:
          polaris_server_url: ${{ vars.POLARIS_URL }} # Polaris server URL
          polaris_access_token: ${{ secrets.POLARIS_ACCESS_TOKEN }} # Token passed from caller
          polaris_application_name: ${{ github.repository_owner }} # Application = org name
          polaris_project_name: ${{ github.event.repository.name }} # Project = repo name
          polaris_assessment_types: ${{ inputs.assessment_types }} # Scan type passed from caller
          github_token: ${{ secrets.GITHUB_TOKEN }} # GitHub token
