name: Polaris SAST with Exclusions
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  polaris-scan-with-excludes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Polaris SAST (with exclusions)
        uses: blackduck-inc/black-duck-security-scan@v2
        with:
          polaris_server_url: ${{ secrets.POLARIS_SERVERURL }}
          polaris_access_token: ${{ secrets.POLARIS_ACCESSTOKEN }}
          polaris_assessment_types: 'SAST'
          polaris_test_sast_type: 'SAST_FULL'
          # Exclude tutorial views and artifacts directories
          project_source_excludes: '["app/views/tutorial/**", "artifacts/**"]'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
