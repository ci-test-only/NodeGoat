name: Polaris Scan # Workflow name shown in GitHub Actions page

on:
  push: # Auto-trigger on push to specified branches
    branches: [master, main, develop]
  pull_request: # Auto-trigger when PR is opened/updated to specified branches
    branches: [master, main, develop]
  workflow_dispatch: {} # Enable manual trigger via "Run workflow" button

permissions:
  contents: read # Required for checkout
  pull-requests: write # Required for posting PR comments

jobs:
  polaris-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Checkout source code
      - name: Black Duck Security Scan
        uses: blackduck-inc/black-duck-security-scan@v2 # Black Duck Security Action (Plugin)
        with:
          polaris_server_url: ${{ vars.POLARIS_URL }} # Polaris server URL (repo/org variable)
          polaris_access_token: ${{ secrets.POLARIS_ACCESS_TOKEN }} # Polaris API token (repo/org secret)
          polaris_application_name: ${{ github.repository_owner }} # Polaris application = GitHub org name
          polaris_project_name: ${{ github.event.repository.name }} # Polaris project = GitHub repo name
          polaris_branch_name: ${{ github.head_ref || github.ref_name }} # PR: head branch; push: current branch
          polaris_branch_parent_name: ${{ github.base_ref || 'master' }} # PR: base branch; push: defaults to master
          polaris_assessment_types: 'SAST,SCA' # Scan types: SAST (static analysis) + SCA (software composition analysis)
          polaris_test_sast_type: ${{ github.event_name == 'pull_request' && 'SAST-RAPID' || 'SAST-FULL' }} # PR: rapid scan; push: full scan
          polaris_prComment_enabled: ${{ github.event_name == 'pull_request' }} # Auto-enable PR comments on pull requests
          polaris_prComment_severities: 'CRITICAL,HIGH,MEDIUM' # Only comment on issues with these severities
          github_token: ${{ secrets.GITHUB_TOKEN }} # GitHub token for PR comments and Checks (plugin input)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Also needed by Bridge CLI (env var)
