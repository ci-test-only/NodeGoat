name: Call Reusable SAST # Caller workflow：呼叫 reusable workflow 執行 SAST 掃描
on:
  workflow_dispatch: {} # 只能手動觸發（demo 用）
jobs:
  call-polaris:
    uses: ./.github/workflows/polaris-reusable.yml # 呼叫同 repo 的 reusable workflow
    with:
      assessment_types: 'SAST' # 傳入掃描類型：只跑 SAST
    secrets:
      POLARIS_ACCESS_TOKEN: ${{ secrets.POLARIS_ACCESS_TOKEN }} # 傳入 Polaris Token
