name: Call Reusable SAST # Caller workflow: invokes reusable workflow for SAST scan
on:
  workflow_dispatch: {} # Manual trigger only (for demo)
jobs:
  call-polaris:
    uses: ./.github/workflows/polaris-reusable.yml # Call reusable workflow in same repo
    with:
      assessment_types: 'SAST' # Pass scan type: SAST only
    secrets:
      POLARIS_ACCESS_TOKEN: ${{ secrets.POLARIS_ACCESS_TOKEN }} # Pass Polaris token
