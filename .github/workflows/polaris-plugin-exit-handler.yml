name: Polaris Scan (Plugin with Exit Code Handling)
on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  polaris-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Black Duck Security Scan
        id: polaris
        continue-on-error: true
        uses: blackduck-inc/black-duck-security-scan@v2
        with:
          polaris_server_url: ${{ vars.POLARIS_URL }}
          polaris_access_token: ${{ secrets.POLARIS_ACCESS_TOKEN }}
          polaris_assessment_types: 'SAST'
          polaris_application_name: ${{ github.repository_owner }}
          polaris_test_sast_type: ${{ github.event_name == 'pull_request' && 'SAST_RAPID' || 'SAST_FULL' }}
          polaris_prComment_enabled: ${{ github.event_name == 'pull_request' }}
          polaris_prComment_severities: 'CRITICAL,HIGH,MEDIUM'
          github_token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Handle scan result
        run: |
          echo "Scan step outcome: ${{ steps.polaris.outcome }}"
          if [ "${{ steps.polaris.outcome }}" = "failure" ]; then
            echo "::error::Polaris scan detected policy violations — breaking the build"
            exit 1  # Change to exit 0 to warn only without failing
          else
            echo "Polaris scan passed"
          fi
