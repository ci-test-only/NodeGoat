name: Polaris Exclude Correct Format
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Polaris SAST (correct exclude format)
        uses: blackduck-inc/black-duck-security-scan@v2
        with:
          polaris_server_url: https://polaris.blackduck.com
          polaris_access_token: ${{ secrets.POLARIS_ACCESS_TOKEN }}
          polaris_assessment_types: 'SAST'
          polaris_test_sast_type: 'SAST_FULL'
          # Correct format: comma-separated, NOT JSON array
          project_source_excludes: 'app/views/tutorial/**, artifacts/**'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
