name: Polaris Exclude Clean Test
on:
  workflow_dispatch:
    inputs:
      use_excludes:
        description: 'Enable source excludes'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Polaris SAST (WITH excludes)
        if: inputs.use_excludes == 'true'
        uses: blackduck-inc/black-duck-security-scan@v2
        with:
          polaris_server_url: https://polaris.blackduck.com
          polaris_access_token: ${{ secrets.POLARIS_ACCESS_TOKEN }}
          polaris_assessment_types: 'SAST'
          polaris_test_sast_type: 'SAST_FULL'
          project_source_excludes: '["app/views/tutorial/**", "artifacts/**"]'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Polaris SAST (WITHOUT excludes)
        if: inputs.use_excludes == 'false'
        uses: blackduck-inc/black-duck-security-scan@v2
        with:
          polaris_server_url: https://polaris.blackduck.com
          polaris_access_token: ${{ secrets.POLARIS_ACCESS_TOKEN }}
          polaris_assessment_types: 'SAST'
          polaris_test_sast_type: 'SAST_FULL'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
