name: Polaris SAST (Weekly) # Weekly SAST scan
on:
  schedule:
    - cron: '0 3 * * 1' # Run every Monday at 03:00 UTC
  workflow_dispatch: {} # Enable manual trigger
permissions:
  contents: read # Required for checkout
jobs:
  polaris-sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Checkout source code
      - uses: blackduck-inc/black-duck-security-scan@v2
        with:
          polaris_server_url: ${{ vars.POLARIS_URL }} # Polaris server URL
          polaris_access_token: ${{ secrets.POLARIS_ACCESS_TOKEN }} # Polaris API token
          polaris_application_name: ${{ github.repository_owner }} # Application = org name
          polaris_project_name: ${{ github.event.repository.name }} # Project = repo name
          polaris_assessment_types: 'SAST' # SAST only (static analysis), no SCA
          github_token: ${{ secrets.GITHUB_TOKEN }} # GitHub token
